name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Load SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HF_SYNC_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add HF to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan hf.co >> ~/.ssh/known_hosts

      - name: Push to Hugging Face
        run: |
          # Use your specific Space address
          git remote add hf git@hf.co:spaces/Takuya-Maekawa1982/bill-extractor-ai
          git push --force hf main