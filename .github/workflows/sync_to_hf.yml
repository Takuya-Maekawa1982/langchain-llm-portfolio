name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: huggingface/hub-sync@v1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Takuya-Maekawa1982/bill-extractor-ai
          hf_token: ${{ secrets.HF_TOKEN }}
          space_sdk: docker