name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use 'token' as the username for Fine-Grained tokens
          # This is the secret to bypassing the 'Invalid password' error
          git push --force https://token:$HF_TOKEN@huggingface.co/spaces/Takuya-Maekawa1982/bill-extractor-ai main